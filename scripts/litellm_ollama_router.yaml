environment_variables:
  OLLAMA_BASE_URL: http://127.0.0.1:11434
  LITELLM_PROXY_BASE_URL: http://127.0.0.1:4000

model_list:
  - model_name: hal-chat-balanced
    litellm_params:
      model: ollama_chat/qwen3:30b
      api_base: os.environ/OLLAMA_BASE_URL
      rpm: 18
      tpm: 90000
    model_info:
      family: qwen3moe
      context_length: 262144
      heuristic_tags:
        - coding
        - long_context
        - tools
        - faster_turnaround
