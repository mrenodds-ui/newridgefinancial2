litellm_settings:
  drop_params: true
  request_timeout: 60
  force_ipv4: true
  json_logs: false
  turn_off_message_logging: true
  redact_user_api_key_info: true

router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  model_group_alias:
    chat: hal-chat-balanced
    coding: hal-coding
    analysis: hal-analysis
    second-opinion: hal-second-opinion
    vision: hal-vision
  fallbacks:
    - hal-coding:
        - hal-analysis
        - hal-chat-balanced
    - hal-analysis:
        - hal-second-opinion
        - hal-chat-balanced
    - hal-second-opinion:
        - hal-analysis
        - hal-chat-balanced
    - hal-chat-balanced:
        - hal-analysis
    - hal-vision:
        - hal-analysis

general_settings:
  infer_model_from_keys: true
  health_check_details: true