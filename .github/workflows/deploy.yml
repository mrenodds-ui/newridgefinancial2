name: Deploy

on:
  workflow_dispatch:
  # Legacy React/FastAPI stack (reference only). NR2 push gate: validate-nr2.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Deploy (placeholder)
        run: echo "Deploy step here (add cloud provider action)"
