name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  # Lightweight secret scan on push; NR2 test gate remains validate-nr2.yml

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.67.3
        with:
          scanArguments: --exclude-path .trufflehogignore .
