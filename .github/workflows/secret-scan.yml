name: Secret Scan

on:
  workflow_dispatch:
  # Manual security scan. NR2 push gate: validate-nr2.yml

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.67.3
        with:
          scanArguments: --exclude-path .trufflehogignore .
