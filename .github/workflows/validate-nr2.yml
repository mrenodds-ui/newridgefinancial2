name: Validate NR2

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NewRidgeFinancial2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep deps minimal: pywebview pulls webview+bottle and breaks tests that stub bottle.
          # rapidfuzz required for HAL-10600/10601/10603 carrier-alias honesty gate.
          python -m pip install requests jsonschema keyring rapidfuzz
        working-directory: NewRidgeFinancial2

      - name: Seed CI import fixtures
        run: |
          mkdir -p ../app_data/nr2/document_inbox/softdent ../app_data/nr2/document_inbox/quickbooks
          cp ci-fixtures/imports/softdent/* ../app_data/nr2/document_inbox/softdent/
          cp ci-fixtures/imports/quickbooks/* ../app_data/nr2/document_inbox/quickbooks/

      - name: Honesty CI gate (null must not become $0.00)
        env:
          NR2_DB_ENCRYPTION: "0"
        run: python ../scripts/run_honesty_ci_gate.py
        working-directory: NewRidgeFinancial2

      - name: Python accounting and import tests
        env:
          NR2_DB_ENCRYPTION: "0"
        run: python -m unittest discover -s . -p "test_*.py"

      - name: Import loader accounting tests
        run: node test_import_loader_accounting.mjs

      - name: Import diagnostics tests
        run: node test_import_diagnostics_node.mjs

      - name: Month-end close and posting tests
        run: node test_month_end_close.mjs

      - name: Accounting month-end smoke snapshot
        run: node import-automation/_accounting_check_snapshot.mjs

      - name: Python accounting bridge tests
        env:
          NR2_DB_ENCRYPTION: "0"
        run: python -m unittest test_accounting_bridge.py

      - name: Validate HAL
        run: node validate-hal.mjs

      - name: Validate pages
        run: node validate-pages.mjs

      - name: Live import smoke
        run: node smoke_desktop_live.mjs

      - name: Staff page smoke (financial, documents, office-manager)
        run: node smoke_desktop_pages.mjs

      - name: Integration health CLI
        env:
          NR2_DB_ENCRYPTION: "0"
        run: python integration_health.py

      - name: Program self-heal (documents only)
        env:
          NR2_DB_ENCRYPTION: "0"
        run: python program_self_heal.py --documents-only --json
