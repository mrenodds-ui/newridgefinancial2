name: FastAPI Backend CI

on:
  workflow_dispatch:
  # Legacy React/FastAPI stack (reference only). NR2 push gate: validate-nr2.yml

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx pydantic ruff
      - name: Lint
        run: |
          ruff app/
      - name: Run tests
        run: |
          pytest app/tests --maxfail=3 --disable-warnings -v
