name: Accessibility Audit

on:
  workflow_dispatch:
  # Legacy React/FastAPI stack (reference only). NR2 push gate: validate-nr2.yml

jobs:
  axe-playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend && npm ci
      - name: Run Playwright Axe a11y tests
        run: |
          cd frontend && npx playwright install && npx playwright test --project=a11y
