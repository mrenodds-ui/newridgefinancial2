name: Performance Budget

on:
  workflow_dispatch:
  # Legacy React/FastAPI stack (reference only). NR2 push gate: validate-nr2.yml

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend && npm ci
      - name: Run Lighthouse CI
        run: |
          npx -p @lhci/cli lhci autorun --collect.url=http://localhost:5173 --assert.preset=lighthouse:recommended
