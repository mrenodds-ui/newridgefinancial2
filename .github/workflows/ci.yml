name: CI

on:
  workflow_dispatch:
  # Legacy React/FastAPI stack (reference only). NR2 push gate: validate-nr2.yml

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies (frontend)
        run: |
          cd frontend
          npm ci
      - name: Lint (frontend)
        run: |
          cd frontend
          npm run lint
      - name: Typecheck (frontend)
        run: |
          cd frontend
          npm run typecheck
      - name: Test (frontend)
        run: |
          cd frontend
          npm test -- --verbose
