name: Close legacy Dependabot PRs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-legacy-dependabot-prs.yml

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const reason =
              'Legacy frontend/FastAPI CI is manual-only for NR2. Dependabot updates are disabled in `.github/dependabot.yml`.';
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            let closed = 0;
            for (const pr of pulls) {
              if (!pr.user || pr.user.login !== 'dependabot[bot]') continue;
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: 'closed',
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: `Closing as part of NR2 hygiene: ${reason}`,
              });
              closed += 1;
            }
            core.info(`Closed ${closed} legacy Dependabot pull request(s).`);
