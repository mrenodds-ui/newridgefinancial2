    <script>
(function(){
  window.NR2_FINANCIAL_ONLY = true;
  window.NR2_WORKSTATION_ONLY = false;
  window.NR2_STAFF_MOCK_ONLY = true;
  window.NR2_STAFF_RENDER_MODE = 'live-wire-pilot';
  window.NR2_LIVE_WIRE_PAGES = ['financial', 'softdent', 'quickbooks', 'ar', 'taxes', 'claims', 'narratives', 'documents', 'library', 'hal', 'office-manager'];
  window.__NR2_REQUIRED_EPOCH = 'moonshot-mockup';
  window.__NR2_REQUIRED_BUILD = 'hal-10153';
  try {
    delete window.LEGACY_PAGE_SCHEMA;
    delete window.OLD_NR2_SCHEMA;
    delete window.WorkstationSchema;
    document.documentElement.setAttribute('data-nr2-epoch','moonshot-mockup');
    document.documentElement.setAttribute('data-nr2-program','financial');
    document.documentElement.setAttribute('data-nr2-staff-render','mock-embed');
    var params = new URLSearchParams(window.location.search);
    if (params.has('__nr2_purge')) {
      window.__NR2_PURGE_ON_LOAD = true;
    }
    if (params.has('__nr2_purge') || window.__NR2_STAFF_MOCK_ONLY) {
      var purgeKey = 'nr2:schema-purge:' + window.__NR2_REQUIRED_BUILD;
      if (params.has('__nr2_purge') && !sessionStorage.getItem(purgeKey)) {
        window.__NR2_BLOCK_BOOT = true;
        document.addEventListener('DOMContentLoaded', function () {
          if (document.body) {
            document.body.innerHTML = '<div style="font-family:system-ui,sans-serif;background:#0a0a0c;color:#f0f0f2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center"><div><h2 style="margin:0 0 8px">Clearing old schema cache</h2><p style="margin:0;color:#8b8b96">Unregistering service worker and reloading fresh assets…</p></div></div>';
          }
        });
        Promise.all([
          ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations().then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); }) : Promise.resolve(),
          ('caches' in window) ? caches.keys().then(function (keys) { return Promise.all(keys.map(function (k) { return caches.delete(k); })); }) : Promise.resolve(),
        ]).finally(function () {
          try { sessionStorage.setItem(purgeKey, String(Date.now())); } catch(e) {}
          var next = new URL(window.location.href);
          next.searchParams.delete('__nr2_purge');
          window.location.replace(next.toString());
        });
      }
      if (!params.has('__nr2_purge') && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        }).catch(function () {});
      }
    }
  } catch(e){}
})();
    </script>
