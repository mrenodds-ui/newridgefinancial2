<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewRidgeFinancial 2.0</title>
    <link rel="stylesheet" href="styles.css?v=hal-46" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar" aria-label="Primary navigation"></aside>

      <main class="main">
        <header class="topbar">
          <div class="pills">
            <span class="pill pill--ok">Local-only</span>
            <span class="pill pill--ok">Read-only</span>
            <span class="pill pill--ok">Human review required</span>
            <span class="pill pill--warn">Not submitted</span>
          </div>
          <span class="topbar-title" id="pageTitle"></span>
        </header>

        <section class="stage">
          <div class="page-frame" id="pageFrame">
            <div id="appPage" class="page-view" hidden></div>
            <div id="halPage" hidden>
              <div id="halPageRoot" class="hp"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer__panel">
        <button class="drawer__close" id="drawerClose" type="button" aria-label="Close panel">Close</button>
        <p class="drawer__eyebrow">HAL Command Center</p>
        <h2 id="drawerTitle"></h2>
        <div id="drawerContent" class="drawer__content"></div>
      </div>
    </aside>

    <!-- Foundation: no HAL deps -->
    <script src="empty-states.js?v=hal-46"></script>
    <script src="import-loader.js?v=hal-46"></script>
    <script src="desktop-bridge.js?v=hal-46"></script>
    <!-- HAL core libraries (must load before HAL consumers) -->
    <script src="hal-core.js?v=hal-46"></script>
    <script src="hal-skills.js?v=hal-46"></script>
    <!-- HAL consumers: agent loop, route executor, stress harness -->
    <script src="hal-agent.js?v=hal-46"></script>
    <script src="hal-route-exec.js?v=hal-46"></script>
    <script src="hal-stress-harness.js?v=hal-46"></script>
    <!-- UI + app shell -->
    <script src="components.js?v=hal-46"></script>
    <script src="services.js?v=hal-46"></script>
    <script src="page-views.js?v=hal-46"></script>
    <script src="hal-page.js?v=hal-46"></script>
    <script src="hal-voice.js?v=hal-46"></script>
    <script src="app.js?v=hal-46"></script>
  </body>
</html>
