<!DOCTYPE html>
<html lang="en" data-apex-version="hal-10631" data-nr2-epoch="nr2-apex" data-apex-blank-widgets="1" data-apex-blank="1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <title>NewRidgeFinancial 2.0 — Apex Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="apex-tokens.css?v=hal-10631">
  <link rel="stylesheet" href="apex-animations.css?v=hal-10631">
  <link rel="stylesheet" href="apex-bridge.css?v=hal-10631">
</head>
<body class="apex-bridge">
  <div id="apex-ticker" class="apex-ticker" aria-live="polite" aria-label="Financial ticker">
    <div class="apex-ticker__label">TELEMETRY</div>
    <div class="apex-ticker__viewport">
      <div class="apex-ticker__track" id="ticker-track">
        <span class="apex-ticker__item apex-ticker__item--system">SYSTEM INITIALIZING…</span>
      </div>
    </div>
  </div>

  <aside id="apex-sidebar" class="apex-sidebar">
    <div class="apex-sidebar__brand">
      <div class="apex-brand">NR2 APEX</div>
      <div class="apex-version">hal-10631 · bridge</div>
    </div>

    <nav class="apex-sidebar__nav" aria-label="Bridge navigation">
      <button type="button" class="apex-nav-btn active" data-page="financial"><span class="apex-nav-icon" aria-hidden="true">◈</span><span class="apex-nav-label">Financial</span></button>
      <button type="button" class="apex-nav-btn" data-page="taxes"><span class="apex-nav-icon" aria-hidden="true">◉</span><span class="apex-nav-label">Taxes</span></button>
      <button type="button" class="apex-nav-btn" data-page="softdent"><span class="apex-nav-icon" aria-hidden="true">◆</span><span class="apex-nav-label">SoftDent</span></button>
      <button type="button" class="apex-nav-btn" data-page="quickbooks"><span class="apex-nav-icon" aria-hidden="true">◇</span><span class="apex-nav-label">QuickBooks</span></button>
      <button type="button" class="apex-nav-btn" data-page="ar"><span class="apex-nav-icon" aria-hidden="true">▣</span><span class="apex-nav-label">A/R</span></button>
      <button type="button" class="apex-nav-btn" data-page="claims"><span class="apex-nav-icon" aria-hidden="true">▤</span><span class="apex-nav-label">Claims</span></button>
      <button type="button" class="apex-nav-btn" data-page="content"><span class="apex-nav-icon" aria-hidden="true">▦</span><span class="apex-nav-label">Content</span></button>
      <button type="button" class="apex-nav-btn" data-page="office-manager"><span class="apex-nav-icon" aria-hidden="true">▩</span><span class="apex-nav-label">Office Mgr</span></button>
      <button type="button" class="apex-nav-btn" data-page="hal"><span class="apex-nav-icon" aria-hidden="true">◐</span><span class="apex-nav-label">HAL</span></button>
    </nav>

    <div class="apex-sidebar__hal">
      <div class="apex-hal-header">
        <div class="hal-orb" id="sidebar-hal-orb" aria-hidden="true"></div>
        <span class="apex-hal-status" id="sidebar-hal-status">HAL Standby</span>
      </div>
      <div class="apex-hal-suggestion" id="sidebar-hal-suggestion">
        <span class="apex-hal-suggestion__label">SUGGESTION</span>
        <p class="apex-hal-suggestion__text" id="hal-suggestion-text">Awaiting telemetry…</p>
      </div>
      <button type="button" class="apex-btn apex-btn--hal" id="btn-ask-hal">Ask HAL</button>
    </div>

    <div class="apex-sidebar__actions">
      <button type="button" class="apex-ticker-mute" id="btn-density" title="Toggle Compact / Comfortable density">Comfortable</button>
      <button type="button" class="apex-icon-btn" id="btn-refresh" title="Force sync / refresh" aria-label="Sync"></button>
      <button type="button" class="apex-icon-btn" id="btn-print" title="Print current view" aria-label="Print"></button>
      <button type="button" class="apex-ticker-mute" id="btn-ticker-mute" title="Pause or resume ticker">Mute Ticker</button>
    </div>
  </aside>

  <main id="apex-main" class="apex-main">
    <header class="apex-stage-header">
      <div class="apex-stage-header__row">
        <h1 class="apex-page-title" id="apex-page-title">Financial</h1>
        <div class="apex-meta" id="apex-meta">Page: financial · Refreshed: —</div>
      </div>
      <nav id="apex-subnav" class="apex-subnav" aria-label="Page subpages" hidden></nav>
    </header>
    <div id="apex-stage" class="apex-stage apex-stage-stack" data-page="financial" data-blank="1" aria-live="polite">
      <div id="apex-placement" class="apex-placement" data-apex-placement="1" data-page="financial"></div>
    </div>
  </main>

  <div id="apex-ticker-bottom" class="apex-ticker apex-ticker--bottom" aria-live="off" aria-label="Secondary telemetry">
    <div class="apex-ticker__label">OPS</div>
    <div class="apex-ticker__viewport">
      <div class="apex-ticker__track" id="ticker-track-bottom">
        <span class="apex-ticker__item apex-ticker__item--system">OPS LINK STANDBY…</span>
      </div>
    </div>
  </div>

  <!-- Blank redesign shell: only chrome + placement host. Widget/mosaic scripts stay off the path. -->
  <script src="apex-core.js?v=hal-10631"></script>
  <script src="apex-ticker.js?v=hal-10631"></script>
  <script src="apex-hal-bridge.js?v=hal-10631"></script>
  <script src="hal-voice.js?v=hal-10631"></script>
  <script src="hal-reports.js?v=hal-10631"></script>
</body>
</html>
