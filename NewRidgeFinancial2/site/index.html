<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewRidgeFinancial 2.0</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <svg class="tooth" viewBox="0 0 64 64" aria-hidden="true">
            <title>New Ridge tooth logo</title>
            <path
              d="M20.9 7.8c4.4 0 7.1 2.4 11.1 2.4s6.7-2.4 11.1-2.4c7.8 0 13.2 6.3 13.2 15.1 0 5.4-2.4 10.4-4.7 15.2-2.2 4.6-3.4 9.7-4.4 14.7-.6 3.1-2.5 5.2-5.1 5.2-3.1 0-4.5-2.9-5.6-6.4l-2.1-6.7c-.7-2.3-1.4-3.8-2.4-3.8s-1.7 1.5-2.4 3.8l-2.1 6.7c-1.1 3.5-2.5 6.4-5.6 6.4-2.6 0-4.5-2.1-5.1-5.2-1-5-2.2-10.1-4.4-14.7-2.3-4.8-4.7-9.8-4.7-15.2C7.7 14.1 13.1 7.8 20.9 7.8Z"
              fill="none"
              stroke="currentColor"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <div class="brand-copy">
            <span class="brand-kicker">Mission Control</span>
            <strong>NewRidgeFinancial 2.0</strong>
          </div>
        </div>

        <nav class="nav" id="nav"></nav>

        <div class="foot">
          <span class="foot-label">Workspace</span>
          <strong>Mission control</strong>
          <span class="foot-copy">New Ridge Family Financial</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="pills">
            <span class="pill pill--ok">Local-only</span>
            <span class="pill pill--ok">Read-only</span>
            <span class="pill pill--ok">Human review required</span>
            <span class="pill pill--warn">Not submitted</span>
          </div>
          <span class="topbar-title" id="pageTitle"></span>
        </header>

        <section class="stage">
          <div class="page-frame" id="pageFrame">
            <img id="pageImage" class="page-image" alt="" />
            <div class="hotspot-layer" id="hotspotLayer" aria-label="HAL Command Center actions"></div>
          </div>
        </section>
      </main>
    </div>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer__panel">
        <button class="drawer__close" id="drawerClose" type="button" aria-label="Close panel">Close</button>
        <p class="drawer__eyebrow">HAL Command Center</p>
        <h2 id="drawerTitle"></h2>
        <div id="drawerContent" class="drawer__content"></div>
      </div>
    </aside>

    <script src="hal-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
